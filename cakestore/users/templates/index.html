{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="cake-hero" style="background: linear-gradient(rgba(255, 77, 148, 0.1), rgba(255, 126, 179, 0.1)); padding: 60px 0; border-bottom: 2px solid #ffeef4;">
    <div class="container text-center">
      <h1 style="color: #ff4d94; font-weight: 800;">🍰 ยินดีต้อนรับกลับมา! 🍰</h1>
      <p style="font-size: 1.2rem; color: #555;">วันนี้มีเค้กแสนอร่อยเมนูไหนที่อยากแนะนำลูกค้าบ้างคะ?</p>
    </div>
  </div>
  
  <div class="container mt-5 mb-5">
    <div class="row g-4">
      <div class="col-md-4">
        <a href="{{ url_for('core.index') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%); color: white; box-shadow: 0 10px 30px rgba(255, 77, 148, 0.3); transition: transform 0.3s;">
            <i class="bi bi-shop" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">หน้าแรก</h3>
            <p>ดูเมนูเค้กทั้งหมดในร้าน</p>
          </div>
        </a>
      </div>
      
      <div class="col-md-4">
        <a href="{{ url_for('cake.index') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #f06292 0%, #f8bbd0 100%); color: white; box-shadow: 0 10px 30px rgba(240, 98, 146, 0.3); transition: transform 0.3s;">
            <i class="bi bi-cake2" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">จัดการเมนูเค้ก</h3>
            <p>เพิ่ม/แก้ไข/ลบเมนูเค้ก</p>
          </div>
        </a>
      </div>
      
      <div class="col-md-4">
        <a href="{{ url_for('users.profile') }}" style="text-decoration: none;">
          <div class="card dashboard-card text-center" style="border: none; border-radius: 25px; padding: 40px; background: linear-gradient(135deg, #ba68c8 0%, #e1bee7 100%); color: white; box-shadow: 0 10px 30px rgba(186, 104, 200, 0.3); transition: transform 0.3s;">
            <i class="bi bi-person-heart" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <h3 style="font-weight: 700;">โปรไฟล์</h3>
            <p>ดูและแก้ไขข้อมูลส่วนตัว</p>
          </div>
        </a>
      </div>
    </div>
  </div>
{% endblock %}
