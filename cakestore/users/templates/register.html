{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="card" style="border: none; border-radius: 25px; padding: 40px; background: white; box-shadow: 0 15px 40px rgba(233, 30, 99, 0.1);">
          <div class="text-center mb-4">
            <div style="font-size: 4rem; background: linear-gradient(135deg, #F06292 0%, #E91E63 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
              <i class="bi bi-person-plus"></i>
            </div>
            <h2 class="section-title" style="color: #880E4F;">Register Form</h2>
          </div>
          <form method="post">
            <div class="mb-4">
              <label for="username" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-person" style="color: #E91E63;"></i> Username
              </label>
              <input name="username" type="text" class="form-control" id="username" required style="border-radius: 15px; padding: 12px; border: 2px solid #fce4ec;">
            </div>
            <div class="mb-4">
              <label for="email" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-envelope" style="color: #E91E63;"></i> Email
              </label>
              <input name="email" type="email" class="form-control" id="email" required style="border-radius: 15px; padding: 12px; border: 2px solid #fce4ec;">
            </div>
            <div class="mb-4">
              <label for="password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-lock" style="color: #E91E63;"></i> Password
              </label>
              <input name="password" type="password" class="form-control" id="password" required style="border-radius: 15px; padding: 12px; border: 2px solid #fce4ec;">
            </div>
            <div class="mb-4">
              <label for="confirm_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-lock-fill" style="color: #E91E63;"></i> Confirm Password
              </label>
              <input name="confirm_password" type="password" class="form-control" id="confirm_password" required style="border-radius: 15px; padding: 12px; border: 2px solid #fce4ec;">
            </div>
            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #F06292 0%, #E91E63 100%); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: 700; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);">
              <i class="bi bi-ui-checks-grid"></i>
              Register
            </button>
          </form>
          <div class="text-center mt-4">
            <p>Already have an account? <a href="{{ url_for('users.login') }}" style="color: #E91E63; font-weight: 600; text-decoration: none;">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
