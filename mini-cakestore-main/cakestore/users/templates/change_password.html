{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card" style="border: none; border-radius: 25px; padding: 40px; background: white; box-shadow: 0 15px 40px rgba(0,0,0,0.1);">
          <div class="text-center mb-4">
            <div style="font-size: 4rem; background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
              <i class="bi bi-shield-lock"></i>
            </div>
            <h2 class="section-title" style="font-weight: 700; color: #333;">{{title}}</h2>
            <p class="text-muted">Security first! Update your cake shop account password.</p>
          </div>

          <form method="post">
            <div class="mb-4">
              <label for="old_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-lock" style="color: #ff4d94;"></i> Old Password
              </label>
              <input name="old_password" type="password" class="form-control" id="old_password" required placeholder="Current password" style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>

            <div class="mb-4">
              <label for="new_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-key" style="color: #ff4d94;"></i> New Password
              </label>
              <input name="new_password" type="password" class="form-control" id="new_password" required placeholder="At least 8 characters" style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>

            <div class="mb-4">
              <label for="confirm_password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-check2-circle" style="color: #ff4d94;"></i> Confirm Password
              </label>
              <input name="confirm_password" type="password" class="form-control" id="confirm_password" required placeholder="Repeat new password" style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>

            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: 700; transition: 0.3s;">
              <i class="bi bi-check-circle"></i>
              Update Password
            </button>
          </form>

          <div class="text-center mt-3">
             <a href="{{ url_for('users.profile') }}" style="color: #ff4d94; text-decoration: none; font-weight: 600;">
               <i class="bi bi-arrow-left"></i> Back to Profile
             </a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
