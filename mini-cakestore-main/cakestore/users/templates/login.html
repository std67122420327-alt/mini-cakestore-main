{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card" style="border: none; border-radius: 25px; padding: 40px; background: white; box-shadow: 0 15px 40px rgba(0,0,0,0.1);">
          <div class="text-center mb-4">
            <div style="font-size: 4rem; background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
              <i class="bi bi-cake2"></i>
            </div>
            <h2 class="section-title" style="font-weight: 700; color: #333;">Cake Shop Login</h2>
            <p class="text-muted">Welcome back! Please login to your account.</p>
          </div>
          <form method="post">
            <div class="mb-4">
              <label for="username" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-person"></i> Username
              </label>
              <input name="username" type="text" class="form-control" id="username" required placeholder="Enter your username" style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>
            
            <div class="mb-4">
              <label for="password" class="form-label" style="font-weight: 600; color: #333;">
                <i class="bi bi-lock"></i> Password
              </label>
              <input name="password" type="password" class="form-control" id="password" required placeholder="Enter your password" style="border-radius: 15px; padding: 12px; border: 2px solid #e0e0e0;">
            </div>
            
            <button type="submit" class="btn btn-lg w-100" style="background: linear-gradient(135deg, #ff4d94 0%, #ff7eb3 100%); color: white; border: none; border-radius: 15px; padding: 12px; font-weight: 700; transition: 0.3s;">
              <i class="bi bi-box-arrow-in-right"></i>
              Login to Cake Shop
            </button>
          </form>
          <div class="text-center mt-4">
            <p>Don't have an account? <a href="{{ url_for('users.register') }}" style="color: #ff4d94; font-weight: 600; text-decoration: none;">Register here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
